<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papelería Milys</title>
    <!-- CSS de Bootstrap -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        .hero-section {
            background-color: #f8f9fa;
            padding: 60px 0;
            text-align: center;
        }
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
<a href="/productos">Listar de productos</a>
<!-- Encabezado / Hero Section -->
<header class="hero-section bg-primary text-white">
    <div class="container">
        <h1 class="display-4 fw-bold">Papelería Milys</h1>
        <p class="lead">Todo lo que necesitas para tus tareas, oficina y proyectos creativos.</p>
    </div>
</header>

<!-- Contenedor Principal de Productos -->
<main class="container my-5">
    <h2 class="text-center mb-4">Nuestros Productos</h2>

    <!-- Grid de Tarjetas -->
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        <!-- Iteración de productos con Thymeleaf -->
        <div class="col" th:each="p : ${productos}">
            <div class="card h-100 shadow-sm">
                <!-- Imagen del producto -->
                <img th:if="${p.rutaImage != null}" th:src="@{'/imgs/' + ${p.rutaImage}}" alt="Imagen del producto"/>


                <!-- Cuerpo de la tarjeta -->
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold" th:text="${p.nombre}">Nombre</h5>
                    <p class="card-text text-muted flex-grow-1" th:text="${producto.nombre}">Descripción corta.</p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="fs-5 fw-bold text-success" th:text="'$' + ${producto.precio}">$0.00</span>
                        <button class="btn btn-outline-primary btn-sm">Ver más</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Pie de página -->
<footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">&copy; 2026 Papelería Milys. Todos los derechos reservados.</p>
</footer>

<!-- JS de Bootstrap -->
<script src="https://jsdelivr.net"></script>
</body>
</html>
