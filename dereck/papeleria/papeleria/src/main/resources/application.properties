spring.application.name=papeleria
# URL de conexión (cambia 'nombre_de_tu_bd' por el nombre real)
server.port=8090
spring.datasource.url=jdbc:mysql://servidor:3306/base de datos?useSSL=false&serverTimezone=UTC

# Credenciales de acceso
spring.datasource.username= username
spring.datasource.password= password

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


#Tamańo máximo imágenes

# Tamańo máximo del archivo (ej. 5MB)
spring.servlet.multipart.max-file-size=5MB
# Tamańo máximo de la petición (ej. 10MB)
#spring.servlet.multipart.max-size=10MB
# Ruta donde se guardarán las imágenes (ej. una carpeta 'uploads' en tu directorio de proyecto o ruta absoluta)
upload.path=imgs/
